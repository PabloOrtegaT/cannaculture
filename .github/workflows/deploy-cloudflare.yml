name: Deploy Cloudflare

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: deploy-cloudflare-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Requires manual approval via GitHub Environments.
    # Configure required reviewers in Settings > Environments > production.
    environment: production
    permissions:
      contents: read
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --include=optional

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Cloudflare preflight
        run: npm run cf:preflight

      - name: Apply D1 migrations (remote)
        # Uses Wrangler's D1 migrations apply command.
        # If this step fails, the deploy is halted so production never runs
        # with an out-of-date schema.
        run: npm run db:migrate:remote

      - name: Build OpenNext bundle
        run: npm run cf:build

      - name: Assert bundle size < 3 MiB
        run: |
          size=$(wc -c < apps/web/.open-next/worker.js)
          echo "worker.js size: $size bytes"
          test "$size" -lt 3145728

      - name: Deploy to Cloudflare Workers
        run: npm run cf:deploy
